<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Live Scoreboard</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .game {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .teams {
            font-size: 20px;
            font-weight: bold;
        }

        .score {
            font-size: 32px;
            color: #2563eb;
        }

        #status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .connected {
            background: #dcfce7;
            color: #16a34a;
        }

        .disconnected {
            background: #fee2e2;
            color: #dc2626;
        }
    </style>
</head>

<body>
    <h1>Live Scoreboard</h1>
    <div id="status" class="disconnected">Connecting...</div>

    <div style="margin-top: 15px; text-align: center;">
        <button onclick="subscribe('NBA')"
            style="padding: 10px 20px; margin: 5px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px;">
            Watch NBA
        </button>
        <button onclick="subscribe('NFL')"
            style="padding: 10px 20px; margin: 5px; background: #16a34a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px;">
            Watch NFL
        </button>
    </div>
    <div id="games"></div>

    <script src="app.js"></script>
</body>

</html>
